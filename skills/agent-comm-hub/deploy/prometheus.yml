# Prometheus 配置 — Agent Comm Hub（Phase 3.1）
# 挂载到容器：docker run -v $(pwd)/prometheus.yml:/etc/prometheus/prometheus.yml prom/prometheus

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'agent-comm-hub'
    static_configs:
      - targets: ['host.docker.internal:3100']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s
