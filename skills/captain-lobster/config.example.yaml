# 龙虾船长配置文件
# 复制为 config.yaml 并放入 skill 目录即可使用
# 大多数用户不需要修改任何配置——默认值就能跑

# ═══════════════════════════════════════════════════════
# OceanBus L0 地址 — 云端消息服务，永远是这个地址
# ⚠️ 不要改！这不是 L1 服务器的地址，是 OceanBus 云端中继
# ═══════════════════════════════════════════════════════
oceanbus_url: "https://ai-t.ihaola.com.cn/api/l0"

# ═══════════════════════════════════════════════════════
# L1 游戏服务器 — 已预配公共 L1，开箱即用
# 如需自建 L1：把下面 openid 换成你的 L1 的 openid
# 或在环境变量中设置 L1_OPENID
# ═══════════════════════════════════════════════════════
l1_nodes:
  - openid: "oa9EliN5y6HhsovCV-Q8uy4CKsQb3oM29GACCZ-6Jpn9YpZn9WNiX9pTJ6DpmgE49nmA_kyIyFk09-hA"
    name: "龙虾船长公测 L1"

# 初始金币（默认 20000）
initial_gold: 10000

# 船长名字（留空自动生成）
captain_name: ""

# 密钥身份（多个船长时区分用）
key_identity: "default"

# 是否启用自主 Re-Act 循环
auto_react: true
