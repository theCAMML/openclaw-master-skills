interface:
  display_name: "OpenClaw CWS Publisher"
  short_description: "Package and harden Chrome extensions with CWS package, listing, E2E, design, Chrome release, competitor, leak, and publish gates"
  default_prompt: "Use $openclaw-cws-publisher to package the target extension directory; validate the exact ZIP against the source manifest and docs/cws/listing.json; scan tracked files for public-surface leaks; run repo-local reviewer/E2E gates; enforce the design/UI/UX evidence gate; check current Chrome Stable release data; run competitor/differentiation checks; generate launch metadata; and render GitHub or ClawHub publish commands with explicit topics and tags. If the extension has a dedicated public privacy/support site, pass --public-site-base or set CWS_PUBLIC_SITE_BASE so reviewer-facing links do not default to repo blobs or issue pages."
