services:
  mai-registry:
    build: .
    image: mai-registry:1.1.2
    command:
      - python3
      - scripts/mai_registry.py
      - serve
      - --data
      - /data/mai-registry.json
      - --host
      - 0.0.0.0
      - --port
      - "8765"
      - --rate-limit-per-minute
      - "${MAI_RATE_LIMIT_PER_MINUTE:-60}"
    ports:
      - "${MAI_REGISTRY_PORT:-8765}:8765"
    volumes:
      - mai_registry_data:/data
    restart: unless-stopped

volumes:
  mai_registry_data:
